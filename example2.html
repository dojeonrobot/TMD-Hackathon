                            ${isOwned ? `${tierInfo.bg} ${tierInfo.border} shadow-lg` : 'bg-gray-900/30 border-gray-700/50 opacity-40 grayscale'}
                          `}>
                            {isOwned && <div className="absolute -top-3 -right-3 bg-emerald-500 text-white w-7 h-7 rounded-full flex items-center justify-center font-black text-sm border-2 border-white z-10 shadow-md">✓</div>}
                            <div className="text-5xl mb-2 mt-2" style={item.isShard ? {filter: item.filter} : {}}>{item.icon}</div>
                            <div className={`text-[10px] font-bold mb-1 px-2 py-0.5 rounded-sm bg-black/60 ${tierInfo.color}`}>{tierInfo.name}</div>
                            <div className={`text-xs font-bold leading-tight h-8 flex items-center justify-center ${isOwned ? 'text-white' : 'text-gray-500'}`}>{item.name.replace(/\[.*?\]\s*/, '')}</div>
                          </div>
                        )
                      })}
                    </div>
                  </div>
                </div>
              </div>
            )
          })()}

          <div className="absolute bottom-6 right-6 flex flex-col gap-2 z-[130] pointer-events-none">
            {toasts.map(t => (
              <div key={t.id} className="bg-gray-800/90 text-white px-6 py-3 rounded-xl border border-gray-600 shadow-2xl font-medium" style={{ animation: 'slideIn 0.3s ease-out' }}>{t.msg}</div>
            ))}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
