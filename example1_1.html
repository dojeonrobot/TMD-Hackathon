<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>강남 파킹프리</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- FontAwesome (아이콘) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Leaflet CSS (지도) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  
  <!-- React & Babel -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Leaflet JS (지도) -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    /* 스크롤바 숨김 처리용 CSS */
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    body { -webkit-tap-highlight-color: transparent; }
  </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900 selection:bg-blue-100">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- Mock Data ---
    const PARKING_SPOTS = [
      { id: 1, name: '역삼1동 공영주차장', type: '공영', available: 12, total: 50, price: '300원/10분', distance: '250m', lat: 37.5000, lng: 127.0350, recommendFor: ['visitor', 'merchant'] },
      { id: 2, name: '논현로 노상 주차장', type: '노상', available: 3, total: 20, price: '500원/10분', distance: '400m', lat: 37.5111, lng: 127.0286, recommendFor: ['visitor'] },
      { id: 3, name: '대치동 거주자우선구역 A', type: '거주자', available: '신청가능', total: 100, price: '40,000원/월', distance: '150m', lat: 37.4950, lng: 127.0600, recommendFor: ['resident'] },
      { id: 4, name: '강남역 환승 주차장', type: '공영', available: 45, total: 200, price: '200원/10분', distance: '800m', lat: 37.4979, lng: 127.0276, recommendFor: ['visitor', 'merchant'] },
    ];

    const HEATMAP_DATA = [
      { id: 1, area: '강남역 11번 출구 이면도로', complaintLevel: 'high', type: '불법주정차', demand: 95 },
      { id: 2, area: '논현동 먹자골목', complaintLevel: 'high', type: '야간주차난', demand: 88 },
      { id: 3, area: '역삼동 주택가', complaintLevel: 'medium', type: '거주자구역 무단주차', demand: 70 },
      { id: 4, area: '양재천 카페거리', complaintLevel: 'low', type: '주말만차', demand: 45 },
    ];

    function App() {
      const [activeTab, setActiveTab] = useState('find');
      const [userType, setUserType] = useState('visitor');
      const [isMapReady, setIsMapReady] = useState(false);
      const mapRef = useRef(null);
      const mapInstance = useRef(null);

      // 1. 지도 초기 생성 (앱 실행 시 단 한 번만 생성하여 메모리 유지)
      useEffect(() => {
        if (!mapRef.current || mapInstance.current) return;

        const map = L.map(mapRef.current).setView([37.4979, 127.0276], 14);
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
          maxZoom: 19,
          attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        mapInstance.current = map;
        setIsMapReady(true); // 지도가 준비되었음을 알림
      }, []);

      // 2. 탭이 바뀔 때마다 숨겨졌던 지도의 크기를 올바르게 재계산
      useEffect(() => {
        if (activeTab === 'find' && mapInstance.current) {
          setTimeout(() => {
            mapInstance.current.invalidateSize();
          }, 50); // 화면이 전환된 직후 약간의 딜레이를 주어 크기 재조정
        }
      }, [activeTab]);

      // 3. 사용자 유형이 바뀌면 마커 새롭게 업데이트
      useEffect(() => {
        if (!isMapReady || !mapInstance.current) return;
        const map = mapInstance.current;

        // 기존 마커 지우기
        map.eachLayer((layer) => {
          if (layer instanceof L.CircleMarker) {
            map.removeLayer(layer);
          }
        });

        // 사용자 유형에 맞는 주차장만 표시
        PARKING_SPOTS.filter(s => s.recommendFor.includes(userType)).forEach(spot => {
          const isResident = spot.type === '거주자';
          const markerColor = isResident ? '#9333ea' : '#2563eb';
          const fillColor = isResident ? '#a855f7' : '#3b82f6';
          
          const marker = L.circleMarker([spot.lat, spot.lng], {
            color: markerColor,
            fillColor: fillColor,
            fillOpacity: 0.8,
            radius: 12
          }).addTo(map);

          marker.bindPopup(`
            <div style="text-align: center; min-width: 100px; font-family: sans-serif;">
              <strong style="font-size: 14px; color: #1f2937;">${spot.name}</strong><br/>
              <div style="margin-top: 4px;">
                <span style="color: ${markerColor}; font-weight: 800; font-size: 16px;">${spot.available}</span>
                <span style="font-size: 12px; color: #4b5563;">${typeof spot.available === 'number' ? '자리 남음' : ''}</span>
              </div>
              <div style="font-size: 12px; color: #6b7280; margin-top: 2px;">${spot.price}</div>
            </div>
          `);
        });
      }, [userType, isMapReady]);

      // --- UI Rendering Functions ---
      const renderHeader = () => (
        <header className="bg-white/90 backdrop-blur-md sticky top-0 z-[1000] border-b border-gray-100 transition-all">
          <div className="max-w-md mx-auto sm:max-w-2xl lg:max-w-4xl px-5 py-3.5 flex items-center justify-between">
            <div className="flex items-center space-x-2">
              <div className="bg-blue-600 w-8 h-8 flex items-center justify-center rounded-xl shadow-sm shadow-blue-200">
                <i className="fas fa-car text-white"></i>
              </div>
              <h1 className="text-xl font-extrabold tracking-tight text-slate-800">파킹프리</h1>
            </div>
            <button className="relative w-9 h-9 flex items-center justify-center text-slate-400 hover:text-slate-600 transition-colors bg-slate-50 rounded-full">
              <i className="far fa-bell text-lg"></i>
              <span className="absolute top-2 right-2 w-2 h-2 bg-red-500 rounded-full border-2 border-slate-50"></span>
            </button>
          </div>
        </header>
      );

      const renderBottomNav = () => (
        <nav className="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-100 pb-safe z-[1000] shadow-[0_-4px_20px_rgba(0,0,0,0.03)]">
          <div className="max-w-md mx-auto sm:max-w-2xl lg:max-w-4xl flex justify-around items-center h-16 px-2">
            <button onClick={() => setActiveTab('find')} className={`flex flex-col items-center justify-center w-full h-full space-y-1 transition-colors ${activeTab === 'find' ? 'text-blue-600' : 'text-slate-400 hover:text-slate-600'}`}>
              <i className={`fas fa-map-marked-alt text-xl ${activeTab === 'find' ? 'text-blue-600' : ''}`}></i>
              <span className="text-[10px] font-bold mt-1">주차장 찾기</span>
            </button>
            <button onClick={() => setActiveTab('heatmap')} className={`flex flex-col items-center justify-center w-full h-full space-y-1 transition-colors ${activeTab === 'heatmap' ? 'text-blue-600' : 'text-slate-400 hover:text-slate-600'}`}>
              <i className={`fas fa-chart-bar text-xl ${activeTab === 'heatmap' ? 'text-blue-600' : ''}`}></i>
              <span className="text-[10px] font-bold mt-1">수요/민원 예측</span>
            </button>
            <button onClick={() => setActiveTab('apply')} className={`flex flex-col items-center justify-center w-full h-full space-y-1 transition-colors ${activeTab === 'apply' ? 'text-blue-600' : 'text-slate-400 hover:text-slate-600'}`}>
              <i className={`fas fa-clipboard-list text-xl ${activeTab === 'apply' ? 'text-blue-600' : ''}`}></i>
              <span className="text-[10px] font-bold mt-1">정기주차 신청</span>
            </button>
          </div>
        </nav>
      );

      const renderTabFindParking = () => (
        <div className="space-y-5">
          {/* User Persona Selector (Chips) */}
          <div className="flex space-x-2 overflow-x-auto pb-1 scrollbar-hide px-1">
            {['visitor', 'resident', 'merchant'].map((type) => (
              <button
                key={type}
                onClick={() => setUserType(type)}
                className={`flex-none px-5 py-2.5 text-[13px] font-bold rounded-full transition-all duration-200 ${
                  userType === type 
                    ? 'bg-slate-800 text-white shadow-md transform scale-105' 
                    : 'bg-white text-slate-500 border border-slate-200 hover:bg-slate-50'
                }`}
              >
                {type === 'visitor' ? '🚗 방문객' : type === 'resident' ? '🏠 거주자' : '💼 상인/직장인'}
              </button>
            ))}
          </div>

          {/* Real Map Area */}
          <div className="relative bg-slate-100 rounded-[2rem] h-[300px] overflow-hidden shadow-[0_8px_30px_rgb(0,0,0,0.06)] border border-slate-200/60 z-0">
            <div ref={mapRef} className="absolute inset-0 w-full h-full z-10"></div>
            
            <div className="absolute top-4 left-4 right-4 z-[400] pointer-events-none">
              <div className="bg-white/90 backdrop-blur px-4 py-3 rounded-2xl shadow-lg border border-white/50 flex items-center space-x-3 pointer-events-auto">
                <i className="fas fa-search text-slate-400"></i>
                <input type="text" placeholder="강남구 내 목적지 검색" className="bg-transparent border-none outline-none text-sm w-full font-medium placeholder:text-slate-400" />
              </div>
            </div>
          </div>

          {/* Recommended List */}
          <div className="space-y-4">
            <div className="flex justify-between items-end px-1 pt-2">
              <h3 className="text-lg font-extrabold text-slate-800 tracking-tight">내 주변 추천 주차장</h3>
              <span className="text-[11px] font-extrabold text-blue-600 bg-blue-50 px-2 py-1 rounded-md flex items-center">
                <i className="far fa-clock mr-1"></i>실시간
              </span>
            </div>
            
            <div className="space-y-3 pb-4">
              {PARKING_SPOTS.filter(spot => spot.recommendFor.includes(userType)).map((spot) => (
                <div 
                  key={spot.id} 
                  onClick={() => {
                    if (mapInstance.current) {
                      mapInstance.current.flyTo([spot.lat, spot.lng], 16, { animate: true, duration: 0.8 });
                      window.scrollTo({ top: 0, behavior: 'smooth' });
                    }
                  }}
                  className="bg-white p-5 rounded-[1.5rem] shadow-[0_2px_15px_rgb(0,0,0,0.03)] border border-slate-100 flex flex-col gap-4 hover:border-blue-400 hover:shadow-md transition-all cursor-pointer group"
                >
                  <div className="flex justify-between items-start">
                    <div className="flex flex-col gap-1.5">
                      <div className="flex items-center space-x-2">
                        <span className={`text-[11px] font-extrabold px-2 py-0.5 rounded-md ${spot.type === '공영' ? 'bg-emerald-100 text-emerald-700' : 'bg-indigo-100 text-indigo-700'}`}>
                          {spot.type}
                        </span>
                        <span className="text-xs font-bold text-slate-400">{spot.distance}</span>
                      </div>
                      <h4 className="text-[17px] font-extrabold text-slate-800">${spot.name}</h4>
                    </div>
                    <div className="flex flex-col items-end">
                      <div className="flex items-baseline space-x-0.5">
                        <span className="text-2xl font-black text-blue-600">{typeof spot.available === 'number' ? spot.available : spot.available}</span>
                        {typeof spot.available === 'number' && <span className="text-sm font-bold text-slate-300">/{spot.total}</span>}
                      </div>
                      <span className="text-[11px] text-slate-400 font-bold tracking-tight">여유 공간</span>
                    </div>
                  </div>
                  
                  <div className="h-px w-full bg-slate-50"></div>
                  
                  <div className="flex justify-between items-center">
                    <span className="font-extrabold text-slate-700 text-sm">${spot.price}</span>
                    <div className="flex items-center text-[13px] font-bold text-blue-600 bg-blue-50 px-3 py-1.5 rounded-xl group-hover:bg-blue-600 group-hover:text-white transition-colors">
                      길안내 <i className="fas fa-chevron-right ml-1 text-[10px]"></i>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      );

      const renderTabHeatmap = () => (
        <div className="space-y-6">
          <div className="bg-gradient-to-br from-slate-800 to-slate-900 p-6 rounded-[2rem] shadow-lg relative overflow-hidden">
            <div className="absolute -right-4 -top-4 opacity-10">
              <i className="fas fa-chart-pie text-[8rem] text-white"></i>
            </div>
            <h2 className="text-xl font-extrabold text-white mb-2 relative z-10">데이터로 보는 주차지도</h2>
            <p className="text-[13px] text-slate-300 relative z-10 font-medium">시간대별 주차 수요와 민원 다발 구역을 시각화하여 스마트한 주차를 돕습니다.</p>
          </div>

          <div className="flex justify-between items-center px-1">
            <h3 className="text-lg font-extrabold text-slate-800">현재 혼잡도 예측</h3>
            <select className="text-sm border-none bg-white shadow-sm rounded-xl px-3 py-2 font-bold text-slate-600 outline-none">
              <option>실시간 (현재)</option>
              <option>오늘 야간 (20:00~)</option>
              <option>주말 (토~일)</option>
            </select>
          </div>

          <div className="space-y-4 pb-4">
            {HEATMAP_DATA.map((data) => (
              <div key={data.id} className="bg-white p-5 rounded-[1.5rem] shadow-[0_2px_15px_rgb(0,0,0,0.03)] border border-slate-100 flex flex-col gap-3">
                <div className="flex justify-between items-start">
                  <div>
                    <div className="flex items-center space-x-2 mb-1">
                      {data.complaintLevel === 'high' && <i className="fas fa-exclamation-triangle text-red-500"></i>}
                      <h4 className="font-extrabold text-slate-800 text-[15px]">{data.area}</h4>
                    </div>
                    <p className="text-[12px] font-bold text-slate-400">{data.type}</p>
                  </div>
                  <span className={`text-[11px] font-extrabold px-2.5 py-1 rounded-lg ${
                    data.complaintLevel === 'high' ? 'bg-red-50 text-red-600' : 
                    data.complaintLevel === 'medium' ? 'bg-orange-50 text-orange-600' : 'bg-emerald-50 text-emerald-600'
                  }`}>
                    {data.complaintLevel === 'high' ? '혼잡' : data.complaintLevel === 'medium' ? '주의' : '원활'}
                  </span>
                </div>

                <div className="mt-1">
                  <div className="flex justify-between text-[10px] font-bold text-slate-400 mb-1.5">
                    <span>예측 수요율</span>
                    <span>{data.demand}%</span>
                  </div>
                  <div className="h-2.5 w-full bg-slate-100 rounded-full overflow-hidden">
                    <div 
                      className={`h-full rounded-full transition-all duration-1000 ${
                        data.complaintLevel === 'high' ? 'bg-gradient-to-r from-red-400 to-red-500' : 
                        data.complaintLevel === 'medium' ? 'bg-gradient-to-r from-orange-400 to-orange-500' : 'bg-gradient-to-r from-emerald-400 to-emerald-500'
                      }`}
                      style={{ width: `${data.demand}%` }}
                    />
                  </div>
                </div>
                
                {data.complaintLevel === 'high' && (
                  <div className="mt-2 text-[12px] bg-slate-50 p-3 rounded-xl text-slate-600 font-medium flex items-start">
                    <span className="mr-2">💡</span> 
                    <span>인근 <strong>도곡초교 공영주차장</strong>에 현재 15면 여유가 있습니다.</span>
                  </div>
                )}
              </div>
            ))}
          </div>
        </div>
      );

      const renderTabApply = () => (
        <div className="space-y-6">
          <div className="bg-gradient-to-br from-blue-600 via-indigo-600 to-blue-800 p-6 rounded-[2rem] text-white shadow-[0_10px_30px_rgba(37,99,235,0.2)] relative overflow-hidden">
            <div className="absolute right-0 bottom-0 opacity-20 transform translate-x-1/4 translate-y-1/4">
              <i className="fas fa-car text-[10rem]"></i>
            </div>
            <span className="inline-block px-3 py-1 bg-white/20 backdrop-blur-md rounded-full text-[11px] font-extrabold tracking-wide mb-3">
              2026년 5월 확대 시행!
            </span>
            <h2 className="text-2xl font-black mb-2">우리동네<br/>월정기주차</h2>
            <p className="text-[13px] text-blue-100 mb-6 font-medium leading-relaxed max-w-[80%]">강남구 거주자 및 상인분들을 위한<br/>저렴하고 안정적인 주차 공간.</p>
            <button className="bg-white text-blue-700 font-extrabold text-[14px] px-5 py-3.5 rounded-xl shadow-sm hover:scale-[1.02] transition-transform w-full flex justify-center items-center">
              신청 가능 여부 조회 <i className="fas fa-chevron-right ml-2 text-xs"></i>
            </button>
          </div>

          <div>
            <h3 className="text-lg font-extrabold text-slate-800 mb-4 px-1">자주 찾는 민원 서비스</h3>
            <div className="grid grid-cols-2 gap-3 pb-4">
              <div className="bg-white p-5 rounded-[1.5rem] shadow-[0_2px_15px_rgb(0,0,0,0.03)] border border-slate-100 flex flex-col items-center text-center cursor-pointer hover:border-blue-400 hover:shadow-md transition-all group">
                <div className="bg-blue-50 w-14 h-14 rounded-2xl flex items-center justify-center mb-3 group-hover:bg-blue-600 transition-colors">
                  <i className="fas fa-map-marker-alt text-blue-600 text-xl group-hover:text-white transition-colors"></i>
                </div>
                <span className="text-[14px] font-extrabold text-slate-800">거주자우선주차</span>
                <span className="text-[11px] text-slate-400 mt-1 font-bold">신청 및 배점 확인</span>
              </div>
              
              <div className="bg-white p-5 rounded-[1.5rem] shadow-[0_2px_15px_rgb(0,0,0,0.03)] border border-slate-100 flex flex-col items-center text-center cursor-pointer hover:border-blue-400 hover:shadow-md transition-all group">
                <div className="bg-emerald-50 w-14 h-14 rounded-2xl flex items-center justify-center mb-3 group-hover:bg-emerald-500 transition-colors">
                  <i className="far fa-clock text-emerald-600 text-xl group-hover:text-white transition-colors"></i>
                </div>
                <span className="text-[14px] font-extrabold text-slate-800">시간제 주차권</span>
                <span className="text-[11px] text-slate-400 mt-1 font-bold">방문차량 등록</span>
              </div>
              
              <div className="bg-white p-5 rounded-[1.5rem] shadow-[0_2px_15px_rgb(0,0,0,0.03)] border border-slate-100 flex flex-col items-center text-center cursor-pointer hover:border-blue-400 hover:shadow-md transition-all group">
                <div className="bg-red-50 w-14 h-14 rounded-2xl flex items-center justify-center mb-3 group-hover:bg-red-500 transition-colors">
                  <i className="fas fa-exclamation-triangle text-red-600 text-xl group-hover:text-white transition-colors"></i>
                </div>
                <span className="text-[14px] font-extrabold text-slate-800">불법주정차 신고</span>
                <span className="text-[11px] text-slate-400 mt-1 font-bold">실시간 민원 접수</span>
              </div>

              <div className="bg-white p-5 rounded-[1.5rem] shadow-[0_2px_15px_rgb(0,0,0,0.03)] border border-slate-100 flex flex-col items-center text-center cursor-pointer hover:border-blue-400 hover:shadow-md transition-all group">
                <div className="bg-indigo-50 w-14 h-14 rounded-2xl flex items-center justify-center mb-3 group-hover:bg-indigo-600 transition-colors">
                  <i className="fas fa-car-side text-indigo-600 text-xl group-hover:text-white transition-colors"></i>
                </div>
                <span className="text-[14px] font-extrabold text-slate-800">주차구역 공유</span>
                <span className="text-[11px] text-slate-400 mt-1 font-bold">부수입 창출하기</span>
              </div>
            </div>
          </div>
        </div>
      );

      return (
        <div className="min-h-screen pb-24">
          {renderHeader()}
          <main className="max-w-md mx-auto sm:max-w-2xl lg:max-w-4xl p-5 relative">
            {/* 탭 이동 시 삭제하지 않고 화면 뒤로 숨김 (CSS 클래스로 조절) */}
            <div className={`animate-in fade-in duration-300 ${activeTab === 'find' ? 'block' : 'hidden'}`}>
              {renderTabFindParking()}
            </div>
            <div className={`animate-in fade-in duration-300 ${activeTab === 'heatmap' ? 'block' : 'hidden'}`}>
              {renderTabHeatmap()}
            </div>
            <div className={`animate-in fade-in duration-300 ${activeTab === 'apply' ? 'block' : 'hidden'}`}>
              {renderTabApply()}
            </div>
          </main>
          {renderBottomNav()}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
